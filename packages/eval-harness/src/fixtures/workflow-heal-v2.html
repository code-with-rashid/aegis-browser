<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Order Status</title>
  </head>
  <body>
    <h1>Order #4471</h1>
    <!--
      Simulates the site changing between record time and replay time (#120): the same
      button, same accessible role/name, but a different id — the recorded step's
      `target.selector` ("#check-status") no longer matches anything, forcing self-heal to
      re-locate it by role/name instead.
    -->
    <button
      id="check-status-v2"
      type="button"
      onclick="document.getElementById('status').hidden = false"
    >
      Check availability
    </button>
    <p id="status" hidden>In stock</p>
  </body>
</html>
